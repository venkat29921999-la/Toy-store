<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Stackly Toy Co.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Poppins:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="404.css">
</head>
<body>

<div class="grain"></div>

<div class="nf-bg-shapes">
  <span class="blob blob-a"></span>
  <span class="blob blob-b"></span>
  <i class="fa-solid fa-puzzle-piece float-icon fi-1"></i>
  <i class="fa-solid fa-star float-icon fi-2"></i>
  <i class="fa-solid fa-kite float-icon fi-3"></i>
  <i class="fa-solid fa-robot float-icon fi-4"></i>
  <i class="fa-solid fa-shapes float-icon fi-5"></i>
</div>

<main class="nf-wrap">

  <a href="index.html" class="nf-logo reveal">
    <span class="logo-mark"><i class="fa-solid fa-shapes"></i></span>
    <span class="logo-text">Stackly</span>
  </a>

  <div class="nf-content">

    <div class="nf-copy">
      <p class="eyebrow reveal"><i class="fa-solid fa-magnifying-glass"></i> Error 404</p>
      <h1 class="nf-code reveal">4<span class="script-word">0</span>4</h1>
      <h2 class="reveal">This shelf came up empty.</h2>
      <p class="nf-sub reveal">The toy you're looking for must have wandered off during playtime. It might have been moved, renamed, or maybe it never sat on this shelf at all.</p>

      <div class="nf-actions reveal">
        <button type="button" id="goBackBtn" class="btn btn-ghost">
          <i class="fa-solid fa-arrow-left"></i>
          <span>Go Back</span>
        </button>
        <a href="index.html" class="btn btn-primary">
          <span>Take Me Home</span>
          <i class="fa-solid fa-house"></i>
        </a>
      </div>
    </div>

    <div class="nf-visual reveal">
      <div class="nf-frame">
        <img src="https://images.unsplash.com/photo-1530325553241-4f6e7690cf36?w=700&q=80&auto=format&fit=crop" alt="A teddy bear sitting alone, lost from the shelf" class="nf-img">
        <div class="nf-tag">
          <i class="fa-solid fa-question"></i>
          <span>Not Found</span>
        </div>
      </div>
      <div class="nf-frame-glow"></div>
    </div>

  </div>

</main>

<script src="404.js"></script>
</body>
</html>
